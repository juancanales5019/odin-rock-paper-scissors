<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!--score board box-->
    <header>
        <h1>ROCK-PAPER-SCISSORS</h1>
    </header>
    <div class="scoreboard">
        <div id="userBadge" class="badge">User</div>
        <div id="computerBadge" class="badge">Comp</div>
        <span id="userScore">0</span>
        <span>:</span>
        <span id="computerScore">0</span>
    </div>
    <!--result box-->
    <div class="result">
        <p>Paper covers rock, you win!</p>
    </div>
    <!--choises boxes-->
    <div class="choises">
        <div class="choise" id="r">
            <img src="" alt="rock">
        </div>
        <div class="choise" id="p">
            <img src="" alt="paper">
        </div>
        <div class="choise" id="s">
            <img src="" alt="scissors">
        </div>
    </div>
    <!--action message-->
    <p id="actionMessage">Make your move</p>
    <script src="script.js"></script>|
</body>
</html
