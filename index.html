<!DOCTYPE html>
<html>

<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
    <h1>Rock Paper Scissors</h1>

    <div id="choices">
        <div class="choice" onclick="play('rock')">Rock</div>
        <div class="choice" onclick="play('paper')">Paper</div>
        <div class="choice" onclick="play('scissors')">Scissors</div>
    </div>

    <div id="result"></div>

    <div id="round">Round: <span id="round-count">0</span></div>

    <div id="score">
        <div>You: <span id="player-score">0</span></div>
        <div>Computer: <span id="computer-score">0</span></div>
    </div>

    <button id="reset-button" onclick="reset()">Reset</button>

    <script src="script.js"></script>
</body>

</html>
